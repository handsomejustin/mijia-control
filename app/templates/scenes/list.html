{% extends "base.html" %}
{% block title %}场景 - 米家控制{% endblock %}

{% block content %}
<div class="mb-6 flex items-center justify-between">
    <h1 class="font-heading text-2xl font-bold text-slate-900 dark:text-white">场景</h1>
    <a href="{{ url_for('web.scenes', refresh='true') }}" class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-medium text-brand-600 dark:text-brand-400 bg-brand-50 dark:bg-brand-900/20 hover:bg-brand-100 dark:hover:bg-brand-900/30 transition-colors">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
        刷新
    </a>
</div>

<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
    {% for scene in scenes %}
    <div class="bg-white dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-700/50 p-4 flex items-center justify-between">
        <div>
            <h3 class="font-medium text-slate-900 dark:text-white text-sm">{{ scene.name }}</h3>
            <p class="text-xs text-slate-400 dark:text-slate-500 font-mono mt-0.5">{{ scene.scene_id }}</p>
        </div>
        <button onclick="runScene('{{ scene.scene_id }}')"
                class="px-3 py-1.5 rounded-lg text-sm font-medium bg-emerald-500 text-white hover:bg-emerald-600 transition-colors shrink-0">
            执行
        </button>
    </div>
    {% endfor %}
    {% if not scenes %}
    <div class="col-span-full py-12 text-center">
        <svg class="w-12 h-12 mx-auto text-slate-300 dark:text-slate-600 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        <p class="text-slate-400 dark:text-slate-500 text-sm">暂无场景</p>
    </div>
    {% endif %}
</div>
{% endblock %}

{% block scripts %}
<script>
function runScene(sceneId) {
    if (!confirm('确定执行场景？')) return;
    fetch(`/api/scenes/${sceneId}/run`, {method: 'POST'})
        .then(r => r.json())
        .then(data => {
            if (data.success) showToast('场景已执行', 'success');
            else showToast(`执行失败: ${data.message}`, 'error');
        });
}
</script>
{% endblock %}
