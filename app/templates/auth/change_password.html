{% extends "base.html" %}
{% block title %}修改密码 - 米家控制{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto mt-12 sm:mt-20">
    <div class="text-center mb-8">
        <div class="w-14 h-14 rounded-2xl bg-slate-200 dark:bg-slate-700 flex items-center justify-center mx-auto mb-4">
            <svg class="w-7 h-7 text-slate-600 dark:text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
        </div>
        <h1 class="font-heading text-2xl font-bold text-slate-900 dark:text-white">修改密码</h1>
    </div>

    <form method="POST" class="bg-white dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-700/50 p-6 space-y-4">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div>
            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">旧密码</label>
            <input type="password" name="old_password" required autocomplete="current-password"
                   class="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-white text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition">
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">新密码</label>
            <input type="password" name="new_password" required autocomplete="new-password" minlength="6"
                   class="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-white text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition">
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">确认新密码</label>
            <input type="password" name="confirm_password" required autocomplete="new-password" minlength="6"
                   class="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-white text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition">
        </div>
        <button type="submit" class="w-full py-2.5 rounded-lg bg-brand-500 hover:bg-brand-600 text-white text-sm font-medium transition-colors">确认修改</button>
    </form>
    <p class="text-center text-sm text-slate-500 dark:text-slate-400 mt-4">
        <a href="{{ url_for('web.dashboard') }}" class="text-brand-600 dark:text-brand-400 hover:underline">返回仪表板</a>
    </p>
</div>
{% endblock %}
