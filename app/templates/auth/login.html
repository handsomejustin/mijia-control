{% extends "base.html" %}
{% block title %}登录 - 米家控制{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto mt-12 sm:mt-20">
    <div class="text-center mb-8">
        <div class="w-14 h-14 rounded-2xl bg-brand-500 flex items-center justify-center mx-auto mb-4">
            <svg class="w-7 h-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        </div>
        <h1 class="font-heading text-2xl font-bold text-slate-900 dark:text-white">登录</h1>
        <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">米家智能设备控制面板</p>
    </div>

    <form method="POST" class="bg-white dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-700/50 p-6 space-y-4">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div>
            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">用户名</label>
            <input type="text" name="username" required autocomplete="username"
                   class="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-white text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition">
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">密码</label>
            <input type="password" name="password" required autocomplete="current-password"
                   class="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-white text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition">
        </div>
        <button type="submit" class="w-full py-2.5 rounded-lg bg-brand-500 hover:bg-brand-600 text-white text-sm font-medium transition-colors">登录</button>
    </form>
    <p class="text-center text-sm text-slate-500 dark:text-slate-400 mt-4">
        没有账号？<a href="{{ url_for('web.register') }}" class="text-brand-600 dark:text-brand-400 hover:underline">注册</a>
    </p>
</div>
{% endblock %}
