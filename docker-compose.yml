version: "3.8"

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-jwt}
      - DATABASE_URL=mysql+pymysql://mijia:mijia_password@db:3306/mijia
      - GO2RTC_URL=${GO2RTC_URL:-http://go2rtc:1984}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root_password}
      - MYSQL_DATABASE=mijia
      - MYSQL_USER=mijia
      - MYSQL_PASSWORD=mijia_password
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    ports:
      - "8000:8000"
    environment:
      - MIJIA_API_URL=http://web:5000/api
      - MIJIA_TOKEN=${MIJIA_TOKEN:-}
      - MIJIA_USERNAME=${MIJIA_USERNAME:-}
      - MIJIA_PASSWORD=${MIJIA_PASSWORD:-}
      - MCP_TRANSPORT=streamable-http
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8000
    depends_on:
      - web
    restart: unless-stopped

  homekit:
    build:
      context: .
      dockerfile: Dockerfile.homekit
    network_mode: host
    environment:
      - MIJIA_API_URL=http://127.0.0.1:5000/api
      - MIJIA_TOKEN=${MIJIA_TOKEN:-}
      - MIJIA_USERNAME=${MIJIA_USERNAME:-}
      - MIJIA_PASSWORD=${MIJIA_PASSWORD:-}
      - HOMEKIT_PORT=${HOMEKIT_PORT:-51826}
      - HOMEKIT_PIN=${HOMEKIT_PIN:-123-45-678}
      - HOMEKIT_PERSIST_FILE=/app/data/homekit.state
    volumes:
      - homekit_data:/app/data
      - ./homekit_mapping.yaml:/app/homekit_mapping.yaml:ro
    depends_on:
      - web
    restart: unless-stopped

  ble:
    build:
      context: .
      dockerfile: Dockerfile.ble
    network_mode: host
    privileged: true
    environment:
      - MIJIA_API_URL=http://127.0.0.1:5000/api
      - MIJIA_TOKEN=${MIJIA_TOKEN:-}
      - MIJIA_USERNAME=${MIJIA_USERNAME:-}
      - MIJIA_PASSWORD=${MIJIA_PASSWORD:-}
      - BLE_ADAPTER=${BLE_ADAPTER:-}
    volumes:
      - /var/run/dbus:/var/run/dbus:ro
    depends_on:
      - web
    restart: unless-stopped

  go2rtc:
    image: alexxit/go2rtc:latest
    network_mode: host
    volumes:
      - ./go2rtc.yaml:/config/go2rtc.yaml
    restart: unless-stopped

volumes:
  mysql_data:
  homekit_data:
